<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦅 RAPTOR Two</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f7fa;color:#1f2328;font-family:"Segoe UI",system-ui,sans-serif;font-size:13px}
#hdr{background:#fff;border-bottom:1px solid #d0d7de;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700}
.spacer{flex:1}
.badge{background:#eef0f3;border:1px solid #d0d7de;border-radius:10px;padding:3px 9px;font-size:11px;color:#57606a}
.badge b{color:#1f2328}
.btn{padding:5px 13px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid}
.btn-blue{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn-grey{background:#eef0f3;border-color:#d0d7de;color:#1f2328}
#vixBox{padding:4px 12px;border-radius:8px;border:2px solid #d0d7de;font-size:11px;font-weight:700}
#tsBar{padding:4px 16px;font-size:11px;background:#fff8c5;border-bottom:1px solid #d4a017;color:#7d4e00}
#tipoBar,#sigBar{background:#fff;border-bottom:1px solid #d0d7de;padding:5px 16px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.lbl{font-size:10px;color:#57606a;font-weight:600;margin-right:4px}
.tb{padding:3px 12px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:700;border:2px solid #d0d7de;background:#eef0f3;color:#57606a}
.tb.act,.tb:hover{border-color:#1d4ed8;background:#dbeafe;color:#1d4ed8}
.sb{padding:3px 10px;border-radius:12px;cursor:pointer;font-size:11px;font-weight:600;border:1px solid #d0d7de;background:#eef0f3;color:#57606a}
.sb.act,.sb:hover{border-color:#1d4ed8;background:#dbeafe;color:#1d4ed8}
#tblWrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th{padding:7px 6px;text-align:left;font-size:10px;color:#57606a;border-bottom:2px solid #d0d7de;white-space:nowrap;cursor:pointer;background:#fff;position:sticky;top:0}
th:hover{color:#1f2328}
td{padding:5px 6px;border-bottom:1px solid #eaecef;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#f0f9ff}
.z{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.z-LC{background:#dafbe1;color:#1a7f37;border:1px solid #1a7f37}
.z-LE{background:#ddf4ff;color:#0969da;border:1px solid #0969da}
.z-G{background:#fff8c5;color:#7d4e00;border:1px solid #d4a017}
.z-U{background:#ffebe9;color:#cf222e;border:1px solid #cf222e}
.z-S{background:#ffebe9;color:#a40000;border:1px solid #a40000}
.z-N{background:#eef0f3;color:#57606a;border:1px solid #d0d7de}
.pos{color:#1a7f37}.neg{color:#cf222e}
.chart-btn{background:#eef0f3;border:1px solid #d0d7de;color:#57606a;padding:2px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.chart-btn:hover{border-color:#1d4ed8;color:#1d4ed8}
#empty{padding:60px;text-align:center;color:#57606a;font-size:16px}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="logo">🦅 RAPTOR TWO</div>
    <div style="font-size:10px;color:#57606a">Ultra · Settoriali · Tematici · Commodities</div>
  </div>
  <div class="spacer"></div>
  <div class="badge">Tot: <b id="hTot">—</b></div>
  <div class="badge">🟢 <b id="hLC">—</b> | 🔵 <b id="hLE">—</b> | 🔴 <b id="hU">—</b> | ⛔ <b id="hS">—</b></div>
  <div id="vixBox">VIX <span id="vixVal">—</span> &nbsp; <span id="regLbl">—</span></div>
  <button class="btn btn-blue" id="btnRefresh">🔄 Aggiorna</button>
  <button class="btn btn-grey" id="btnExcel">📥 Excel</button>
  <a href="https://giorgiogoldoni.github.io/fixed/" style="padding:5px 13px;border-radius:6px;font-size:11px;border:1px solid #d0d7de;background:#eef0f3;color:#57606a;text-decoration:none">← Suite</a>
</div>

<div id="tsBar">⏳ Caricamento...</div>

<div id="tipoBar">
  <span class="lbl">SEZIONE:</span>
  <button class="tb act" data-tipo="ALL">📋 Tutti</button>
  <button class="tb" data-tipo="ULTRA">💼 Ultra</button>
  <button class="tb" data-tipo="SETTORIALI">🏭 Settoriali</button>
  <button class="tb" data-tipo="TEMATICI">🚀 Tematici</button>
  <button class="tb" data-tipo="COMMODITIES">🌾 Commodities</button>
</div>

<div id="sigBar">
  <span class="lbl">SEGNALE:</span>
  <button class="sb act" data-zona="ALL">📋 Tutti</button>
  <button class="sb" data-zona="LONG_CONF">🟢 Long Conf</button>
  <button class="sb" data-zona="LONG_EARLY">🔵 Long Early</button>
  <button class="sb" data-zona="GRIGIA">🟡 Grigia</button>
  <button class="sb" data-zona="USCITA">🔴 Uscita</button>
  <button class="sb" data-zona="STOP">⛔ Stop</button>
</div>

<div id="tblWrap">
  <table id="mainTbl" style="display:none">
    <thead><tr>
      <th data-col="ticker">Ticker</th>
      <th data-col="nome">Nome</th>
      <th data-col="tipo">Tipo</th>
      <th data-col="provider">Provider</th>
      <th data-col="zona">Zona</th>
      <th data-col="score">Score ↓</th>
      <th data-col="prezzo">Prezzo</th>
      <th>KAMA F/S</th>
      <th data-col="sar">SAR</th>
      <th data-col="ao">AO</th>
      <th data-col="volRatio">VOL</th>
      <th data-col="rsi">RSI</th>
      <th data-col="perfSett">Sett%</th>
      <th data-col="perfMese">Mese%</th>
      <th data-col="entryDate">🕐 Segnale</th>
      <th>📈</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">🦅 Caricamento...</div>
</div>

<script>
var allData = [];
var activeTipo = 'ALL';
var activeZona = 'ALL';
var sortCol = 'score';
var sortDir = -1;

var JSON_URL = 'https://raw.githubusercontent.com/Giorgiogoldoni/raptor-two/main/raptor_two.json';

function loadJSON() {
  document.getElementById('tsBar').textContent = '⏳ Caricamento...';
  document.getElementById('tsBar').style.background = '#fff8c5';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', JSON_URL + '?t=' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status !== 200) {
      document.getElementById('tsBar').textContent = '⚠️ Errore HTTP ' + xhr.status;
      return;
    }
    try {
      var obj = JSON.parse(xhr.responseText);
      allData = obj.data || [];
      document.getElementById('hTot').textContent = allData.length;
      document.getElementById('hLC').textContent = allData.filter(function(r){return r.zona==='LONG_CONF';}).length;
      document.getElementById('hLE').textContent = allData.filter(function(r){return r.zona==='LONG_EARLY';}).length;
      document.getElementById('hU').textContent  = allData.filter(function(r){return r.zona==='USCITA';}).length;
      document.getElementById('hS').textContent  = allData.filter(function(r){return r.zona==='STOP';}).length;
      document.getElementById('vixVal').textContent = (obj.vix || '—') + ' / ' + (obj.vstoxx || '—');
      document.getElementById('regLbl').textContent = obj.regime || '—';
      var tb = document.getElementById('tsBar');
      tb.textContent = '✅ ' + (obj.timestamp_it || '—') + ' · ' + (obj.ok || 0) + '/' + (obj.total || 0) + ' ticker · Regime: ' + (obj.regime || '—');
      tb.style.background = '#dafbe1';
      tb.style.color = '#1a7f37';
      renderTable();
    } catch(e) {
      document.getElementById('tsBar').textContent = '⚠️ Errore parsing JSON: ' + e.message;
    }
  };
  xhr.onerror = function() {
    document.getElementById('tsBar').textContent = '⚠️ Errore di rete — controllare connessione';
  };
  xhr.send();
}

function renderTable() {
  var data = allData.filter(function(r) {
    if (activeTipo !== 'ALL' && r.tipo !== activeTipo) return false;
    if (activeZona !== 'ALL' && r.zona !== activeZona) return false;
    return true;
  });

  data.sort(function(a, b) {
    var av = a[sortCol], bv = b[sortCol];
    if (av == null) av = sortDir > 0 ? 9999 : -9999;
    if (bv == null) bv = sortDir > 0 ? 9999 : -9999;
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  if (!data.length) {
    document.getElementById('mainTbl').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = 'Nessun risultato';
    return;
  }

  var ZONA_HTML = {
    'LONG_CONF':  '<span class="z z-LC">🟢 LONG CONF</span>',
    'LONG_EARLY': '<span class="z z-LE">🔵 LONG EARLY</span>',
    'GRIGIA':     '<span class="z z-G">🟡 GRIGIA</span>',
    'USCITA':     '<span class="z z-U">🔴 USCITA</span>',
    'STOP':       '<span class="z z-S">⛔ STOP</span>'
  };

  var TIPO_CLR = {
    'ULTRA':       '#1d4ed8',
    'SETTORIALI':  '#16a34a',
    'TEMATICI':    '#7c3aed',
    'COMMODITIES': '#c2410c'
  };

  var html = '';
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var zona = r.zona || 'ND';
    var zonaH = ZONA_HTML[zona] || '<span class="z z-N">' + zona + '</span>';
    var tipoClr = TIPO_CLR[r.tipo] || '#57606a';
    var tipoH = '<span style="background:rgba(0,0,0,.06);color:' + tipoClr + ';font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700">' + (r.tipo || '') + '</span>';
    var kfH = r.kama_fast ? '<span style="color:#dc2626;font-size:10px">F:' + r.kama_fast.toFixed(3) + '</span><br><span style="color:#7c3aed;font-size:10px">S:' + (r.kama_slow ? r.kama_slow.toFixed(3) : '—') + '</span>' : '—';
    var sarH = r.sar != null ? '<span style="color:' + (r.sarBull ? '#1a7f37' : '#cf222e') + ';font-weight:700;font-size:10px">' + (r.sarBull ? '▲' : '▼') + ' ' + r.sar.toFixed(3) + '</span>' : '—';
    var aoH = r.ao != null ? '<span class="' + (r.ao >= 0 ? 'pos' : 'neg') + '">' + (r.ao >= 0 ? '▲' : '▼') + ' ' + Math.abs(r.ao).toFixed(3) + '</span>' : '—';
    var volH = r.volRatio != null ? '<span style="font-weight:700;color:' + (r.volRatio >= 1.5 ? '#1a7f37' : '#57606a') + '">' + r.volRatio.toFixed(1) + 'x</span>' : '—';
    var rsiH = r.rsi != null ? '<span style="color:' + (r.rsi >= 70 ? '#cf222e' : r.rsi <= 30 ? '#1a7f37' : '#57606a') + '">' + r.rsi.toFixed(1) + '</span>' : '—';
    var p5H  = r.perfSett  != null ? '<span class="' + (r.perfSett  >= 0 ? 'pos' : 'neg') + '">' + (r.perfSett  >= 0 ? '+' : '') + r.perfSett  + '%</span>' : '—';
    var p20H = r.perfMese  != null ? '<span class="' + (r.perfMese  >= 0 ? 'pos' : 'neg') + '">' + (r.perfMese  >= 0 ? '+' : '') + r.perfMese  + '%</span>' : '—';
    var nome = (r.nome || '').slice(0, 45);
    html += '<tr>';
    html += '<td><b>' + (r.ticker || '') + '</b></td>';
    html += '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="' + (r.nome || '') + '">' + nome + '</td>';
    html += '<td>' + tipoH + '</td>';
    html += '<td style="font-size:10px;color:#57606a">' + (r.provider || '') + '</td>';
    html += '<td>' + zonaH + '</td>';
    html += '<td><b>' + (r.score || 0) + '</b></td>';
    html += '<td style="font-family:monospace">' + (r.prezzo != null ? r.prezzo.toFixed(3) : '—') + '</td>';
    html += '<td>' + kfH + '</td>';
    html += '<td>' + sarH + '</td>';
    html += '<td>' + aoH + '</td>';
    html += '<td>' + volH + '</td>';
    html += '<td>' + rsiH + '</td>';
    html += '<td>' + p5H + '</td>';
    html += '<td>' + p20H + '</td>';
    html += '<td style="font-size:10px;color:#57606a">' + (r.entryDate || '—') + '</td>';
    html += '<td><button class="chart-btn" onclick="openChart(\'' + encodeURIComponent(r.yahoo || r.ticker) + '\')">📈</button></td>';
    html += '</tr>';
  }

  document.getElementById('tbody').innerHTML = html;
  document.getElementById('mainTbl').style.display = '';
  document.getElementById('empty').style.display = 'none';
}

function openChart(sym) {
  window.open('RAPTOR_Chart_Two.html?ticker=' + sym, '_blank');
}

function exportExcel() {
  if (!allData.length) { alert('Nessun dato'); return; }
  var rows = allData.map(function(r) {
    return {Ticker:r.ticker,Tipo:r.tipo,Nome:r.nome,Provider:r.provider,Zona:r.zona,
      Score:r.score,Prezzo:r.prezzo,'KAMA F':r.kama_fast,'KAMA S':r.kama_slow,
      SAR:r.sar,AO:r.ao,RSI:r.rsi,VOL:r.volRatio,'Sett%':r.perfSett,'Mese%':r.perfMese};
  });
  var ws = XLSX.utils.json_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'RAPTOR Two');
  XLSX.writeFile(wb, 'raptor_two_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

// Event listeners
document.getElementById('btnRefresh').addEventListener('click', loadJSON);
document.getElementById('btnExcel').addEventListener('click', exportExcel);

document.querySelectorAll('.tb').forEach(function(btn) {
  btn.addEventListener('click', function() {
    activeTipo = this.getAttribute('data-tipo');
    document.querySelectorAll('.tb').forEach(function(b){ b.classList.remove('act'); });
    this.classList.add('act');
    renderTable();
  });
});

document.querySelectorAll('.sb').forEach(function(btn) {
  btn.addEventListener('click', function() {
    activeZona = this.getAttribute('data-zona');
    document.querySelectorAll('.sb').forEach(function(b){ b.classList.remove('act'); });
    this.classList.add('act');
    renderTable();
  });
});

document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = this.getAttribute('data-col');
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
    renderTable();
  });
});

// Avvio
loadJSON();
</script>
</body>
</html>
