<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ RAPTOR Chart Two</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1f2328;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.sym{font-size:16px;font-weight:700;color:#1e40af}
.nome{font-size:11px;color:#57606a}
.spacer{flex:1}
.tf-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.tf-btn.act,.tf-btn:hover{background:#1e40af;border-color:#1e40af;color:#fff}
.tipo-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;color:#fff}
#statsBar{background:#fff;border-bottom:1px solid #e2e8f0;padding:6px 16px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:4px 10px;text-align:center;min-width:70px}
.stat .sl{font-size:8px;color:#94a3b8;letter-spacing:.5px}
.stat .sv{font-size:13px;font-weight:700;margin-top:1px}
#chartsWrap{flex:1;display:flex;flex-direction:column;gap:4px;padding:8px;overflow:hidden}
.cpanel{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;display:flex;flex-direction:column}
.cpanel.main{flex:3}.cpanel.sub{flex:1}
.cplbl{font-size:8px;color:#1e40af;letter-spacing:1px;margin-bottom:3px;font-weight:600}
.cpanel canvas{flex:1;width:100%!important}
#errBox{display:none;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:16px 20px;margin:20px;border-radius:8px;font-size:12px}
#loadMsg{font-size:11px;color:#94a3b8}
</style>
</head>
<body>
<div id="hdr">
  <div><div id="symTitle" class="sym">—</div><div id="nomeTitle" class="nome">—</div></div>
  <div class="spacer"></div>
  <div style="display:flex;gap:4px">
    <button class="tf-btn act" onclick="setTF('1d')" id="tf1d">1g</button>
    <button class="tf-btn" onclick="setTF('1m')" id="tf1m">1m</button>
    <button class="tf-btn" onclick="setTF('3m')" id="tf3m">3m</button>
    <button class="tf-btn" onclick="setTF('6m')" id="tf6m">6m</button>
  </div>
  <span id="tipoBadge" class="tipo-badge">ULTRA</span>
  <span id="loadMsg">Caricamento...</span>
  <button onclick="window.close()" style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;padding:4px 12px;cursor:pointer;font-size:11px;font-family:inherit">✕</button>
</div>
<div id="statsBar">
  <div class="stat"><div class="sl">PREZZO</div><div class="sv" id="sP">—</div></div>
  <div class="stat"><div class="sl">KAMA FAST</div><div class="sv" id="sKF" style="color:#dc2626">—</div></div>
  <div class="stat"><div class="sl">KAMA SLOW</div><div class="sv" id="sKS" style="color:#7c3aed">—</div></div>
  <div class="stat"><div class="sl">SAR</div><div class="sv" id="sSAR">—</div></div>
  <div class="stat"><div class="sl">AO</div><div class="sv" id="sAO">—</div></div>
  <div class="stat"><div class="sl">RSI 14</div><div class="sv" id="sRSI">—</div></div>
  <div class="stat"><div class="sl">ZONA</div><div class="sv" id="sZ">—</div></div>
  <div class="stat"><div class="sl">SEGNALE</div><div class="sv" id="sSG">—</div></div>
</div>
<div id="errBox"></div>
<div id="chartsWrap">
  <div class="cpanel main"><div class="cplbl">PREZZO · KAMA VELOCE · KAMA LENTA · SAR</div><canvas id="c1"></canvas></div>
  <div class="cpanel sub"><div class="cplbl">BAFFETTINI AO</div><canvas id="c2"></canvas></div>
  <div class="cpanel sub"><div class="cplbl">AO</div><canvas id="c3"></canvas></div>
  <div class="cpanel sub"><div class="cplbl">RSI 14</div><canvas id="c4"></canvas></div>
</div>
<script>
const CHART_URL='https://raw.githubusercontent.com/Giorgiogoldoni/raptor-two/main/raptor_chart_two.json';
const TWO_URL='https://raw.githubusercontent.com/Giorgiogoldoni/raptor-two/main/raptor_two.json';
const TF_BARS={1d:5,'1m':21,'3m':63,'6m':126};
const TC={ULTRA:'#1e40af',SETTORIALI:'#7c3aed',TEMATICI:'#0369a1',COMMODITIES:'#92400e'};
const KP={ULTRA:{fn:10,ff:2,fs:30,sn:30,sf:2,ss:60,ss_:0.01,sm:0.15,af:5,as_:34},SETTORIALI:{fn:8,ff:2,fs:25,sn:21,sf:2,ss:50,ss_:0.02,sm:0.20,af:5,as_:34},TEMATICI:{fn:5,ff:2,fs:20,sn:15,sf:2,ss:40,ss_:0.025,sm:0.20,af:3,as_:13},COMMODITIES:{fn:7,ff:2,fs:20,sn:20,sf:2,ss:40,ss_:0.04,sm:0.30,af:5,as_:34}};
let tf='1d',cd=null,td=null,ch={},sym='';

function kama(c,n,f,s){const fk=2/(f+1),sk=2/(s+1),k=new Array(c.length).fill(null);if(c.length<=n)return k;k[n]=c[n];for(let i=n+1;i<c.length;i++){const d=Math.abs(c[i]-c[i-n]);let v=0;for(let j=i-n+1;j<=i;j++)v+=Math.abs(c[j]-c[j-1]);const er=v>0?d/v:0,sc=Math.pow(er*(fk-sk)+sk,2);k[i]=k[i-1]+sc*(c[i]-k[i-1]);}return k;}
function sar(h,l,st,mx){const n=h.length,s=new Array(n).fill(null);if(n<5)return s;let b=h[1]>h[0],af=st,ep=b?Math.max(h[0],h[1]):Math.min(l[0],l[1]);s[1]=b?Math.min(l[0],l[1]):Math.max(h[0],h[1]);for(let i=2;i<n;i++){const ps=s[i-1];if(b){s[i]=Math.min(ps+af*(ep-ps),l[i-1],i>=2?l[i-2]:l[i-1]);if(l[i]<s[i]){b=false;af=st;s[i]=ep;ep=l[i];}else if(h[i]>ep){ep=h[i];af=Math.min(af+st,mx);}}else{s[i]=Math.max(ps+af*(ep-ps),h[i-1],i>=2?h[i-2]:h[i-1]);if(h[i]>s[i]){b=true;af=st;s[i]=ep;ep=h[i];}else if(l[i]<ep){ep=l[i];af=Math.min(af+st,mx);}}}return s;}
function ao(h,l,fp,sp){const m=h.map((v,i)=>(v+l[i])/2);if(m.length<sp)return new Array(m.length).fill(0);function ema(a,p){const k=2/(p+1);let e=a[0];const r=[e];for(let i=1;i<a.length;i++){e=a[i]*k+e*(1-k);r.push(e);}return r;}const ef=ema(m,fp),es=ema(m,sp);return ef.map((v,i)=>+(v-es[i]).toFixed(4));}
function rsi(c,n=14){const r=new Array(c.length).fill(null);if(c.length<n+2)return r;for(let i=n+1;i<c.length;i++){let g=0,lo=0;for(let j=i-n;j<=i;j++){const d=c[j]-c[j-1];if(d>0)g+=d;else lo-=d;}const ag=g/n,al=lo/n;r[i]=al===0?100:Math.round((100-100/(1+ag/al))*10)/10;}return r;}
function baf(h,l,fp,sp){const a=ao(h,l,fp,sp);return{vals:a.map(v=>Math.abs(v)),cols:a.map((v,i)=>{const u=v>=(a[i-1]??v);return v>=0?u?'#16a34a':'#86efac':u?'#fca5a5':'#dc2626';})}}

function render(){
  if(!cd||!sym)return;
  const n=TF_BARS[tf]||5;
  const keys=Object.keys(cd.data||{});
  const key=keys.find(k=>k.toLowerCase()===sym.toLowerCase())||keys.find(k=>k.toLowerCase()===sym.toLowerCase().replace(/\.(mi|de|l|pa|as|sw)$/,''));
  if(!key){showErr(`${sym} non trovato — dati non disponibili`);return;}
  const raw=(cd.data[key]||[]).slice(-n);
  if(raw.length<5){showErr(`Dati insufficienti (${raw.length} barre)`);return;}
  hideErr();
  const row=td?.data?.find(r=>r.yahoo===sym||r.ticker===sym);
  const tipo=row?.tipo||'ULTRA';
  const p=KP[tipo];
  const cl=raw.map(b=>b[4]),hi=raw.map(b=>b[2]),lo=raw.map(b=>b[3]);
  const lb=raw.map(b=>new Date(b[0]*1000).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}));
  const kf_=kama(cl,p.fn,p.ff,p.fs),ks_=kama(cl,p.sn,p.sf,p.ss);
  const sr=sar(hi,lo,p.ss_,p.sm),av=ao(hi,lo,p.af,p.as_),rv=rsi(cl),bv=baf(hi,lo,p.af,p.as_);
  const lc=cl.at(-1),lkf=kf_.at(-1),lks=ks_.at(-1),lsr=sr.at(-1),lao=av.at(-1),lrsi=rv.at(-1);
  const sb=lsr!=null&&lc>lsr,tcl=TC[tipo]||'#1e40af';
  document.getElementById('sP').textContent=lc.toFixed(3);document.getElementById('sP').style.color=lc>(lkf||lc)?'#16a34a':'#dc2626';
  document.getElementById('sKF').textContent=lkf?lkf.toFixed(3):'—';
  document.getElementById('sKS').textContent=lks?lks.toFixed(3):'—';
  document.getElementById('sSAR').textContent=lsr?(sb?'▲ ':'▼ ')+lsr.toFixed(3):'—';document.getElementById('sSAR').style.color=sb?'#16a34a':'#dc2626';
  document.getElementById('sAO').textContent=(lao>=0?'▲ ':'▼ ')+Math.abs(lao).toFixed(3);document.getElementById('sAO').style.color=lao>=0?'#16a34a':'#dc2626';
  document.getElementById('sRSI').textContent=lrsi!=null?lrsi.toFixed(1):'—';document.getElementById('sRSI').style.color=lrsi>=70?'#dc2626':lrsi<=30?'#16a34a':'#1f2328';
  if(row){const I={LONG_CONF:'🟢',LONG_EARLY:'🔵',GRIGIA:'🟡',USCITA:'🔴',STOP:'⛔'};document.getElementById('sZ').textContent=(I[row.zona]||'')+' '+(row.zona||'—');document.getElementById('sSG').textContent=row.segnale||'—';document.getElementById('sSG').style.color=row.segnale==='LONG'?'#16a34a':row.segnale==='EARLY'?'#2563eb':row.segnale==='STOP'?'#dc2626':'#1f2328';}
  Object.values(ch).forEach(c=>{try{c.destroy();}catch(e){}});ch={};
  ['c1','c2','c3','c4'].forEach(id=>{const old=document.getElementById(id);if(old){const neo=document.createElement('canvas');neo.id=id;old.parentNode.replaceChild(neo,old);}});
  const gc='#f1f5f9',tc='#94a3b8';
  const co={responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#475569',font:{size:9},boxWidth:12,padding:5}},tooltip:{backgroundColor:'#fff',borderColor:'#e2e8f0',borderWidth:1,titleColor:'#1f2328',bodyColor:'#475569',callbacks:{label:c=>' '+c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y.toFixed(3):'—')}}},scales:{x:{ticks:{color:tc,font:{size:8},maxTicksLimit:10},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9}},grid:{color:gc},position:'right'}}};
  ch.c1=new Chart(document.getElementById('c1'),{type:'line',data:{labels:lb,datasets:[{label:'Prezzo',data:cl.map(v=>+v.toFixed(3)),borderColor:'#1f2328',borderWidth:2.5,pointRadius:0,tension:0},{label:'KAMA Fast',data:kf_.map(v=>v!=null?+v.toFixed(3):null),borderColor:'#ef4444',borderWidth:2,pointRadius:0,tension:0.2,spanGaps:true},{label:'KAMA Slow',data:ks_.map(v=>v!=null?+v.toFixed(3):null),borderColor:'#a78bfa',borderWidth:2,pointRadius:0,tension:0.3,spanGaps:true,borderDash:[5,3]},{label:'SAR',data:sr.map(v=>v!=null?+v.toFixed(3):null),borderWidth:0,pointRadius:sr.map(v=>v!=null?4:0),pointBackgroundColor:sr.map((v,i)=>v!=null&&cl[i]>v?'#22c55e':'#ef4444'),pointBorderColor:'transparent',showLine:false}]},options:co});
  ch.c2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:lb,datasets:[{label:'Baffettini',data:bv.vals,backgroundColor:bv.cols,borderRadius:1}]},options:{...co,plugins:{...co.plugins,legend:{display:false}}}});
  const ac=av.map((v,i)=>v>=(av[i-1]??v)?'#16a34a':'#dc2626');
  ch.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:lb,datasets:[{label:'AO',data:av,backgroundColor:ac,borderRadius:1}]},options:{...co,plugins:{...co.plugins,legend:{display:false}}}});
  const rp={id:'rL',afterDraw(c){const{ctx,chartArea:{left,right},scales:{y}}=c;ctx.save();[[70,'#ef4444'],[30,'#22c55e']].forEach(([v,col])=>{const yp=y.getPixelForValue(v);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();});ctx.setLineDash([]);ctx.restore();}};
  ch.c4=new Chart(document.getElementById('c4'),{type:'line',plugins:[rp],data:{labels:lb,datasets:[{label:'RSI 14',data:rv,borderColor:tcl,borderWidth:1.5,pointRadius:0,tension:0.3,spanGaps:true}]},options:{...co,plugins:{...co.plugins,legend:{display:false}},scales:{...co.scales,y:{min:0,max:100,ticks:{color:tc,font:{size:8},stepSize:25},grid:{color:gc},position:'right'}}}});
  document.getElementById('loadMsg').textContent=cd.timestamp_it+' · '+raw.length+' barre';
}

function setTF(t){tf=t;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('act'));document.getElementById('tf'+t).classList.add('act');render();}
function showErr(m){document.getElementById('errBox').textContent='⚠️ '+m;document.getElementById('errBox').style.display='block';document.getElementById('chartsWrap').style.display='none';document.getElementById('statsBar').style.display='none';}
function hideErr(){document.getElementById('errBox').style.display='none';document.getElementById('chartsWrap').style.display='flex';document.getElementById('statsBar').style.display='flex';}

async function init(){
  const p=new URLSearchParams(window.location.search);sym=p.get('ticker');
  if(!sym){showErr('Nessun ticker');return;}
  document.getElementById('symTitle').textContent=sym;document.title='⚡ '+sym;
  try{
    const[r1,r2]=await Promise.all([fetch(CHART_URL+'?t='+Date.now()),fetch(TWO_URL+'?t='+Date.now())]);
    if(!r1.ok)throw new Error('raptor_chart_two.json non disponibile (HTTP '+r1.status+') — lanciare Actions → RAPTOR Chart Two Fetch → Run workflow');
    cd=await r1.json();if(r2.ok)td=await r2.json();
    const row=td?.data?.find(r=>r.yahoo===sym||r.ticker===sym);
    document.getElementById('nomeTitle').textContent=row?.nome||'';
    const tipo=row?.tipo||'ULTRA';
    document.getElementById('tipoBadge').textContent=tipo;document.getElementById('tipoBadge').style.background=TC[tipo]||'#1e40af';
    render();
  }catch(e){showErr(e.message);}
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
